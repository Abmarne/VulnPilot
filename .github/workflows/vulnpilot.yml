name: 🛡️ VulnPilot Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  vulnpilot-scan:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: 🚀 Run VulnPilot Headless Scan
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        # Scan the current repository (./) and fail if HIGH severity found
        python backend/cli.py --target "./" --fail-on "High" --output "vuln_report.md"

    - name: 📄 Post Security Report as PR Comment
      if: github.event_name == 'pull_request'
      uses: scacap/action-status-embed@v1
      with:
        status: ${{ job.status }}
        text: "VulnPilot found security issues! Check the attached report."
      # Note: For real PR comments, you'd use a generic "comment-on-pr" action
      # or simply 'cat vuln_report.md' into the summary.

    - name: 📤 Upload Scan Results
      uses: actions/upload-artifact@v3
      with:
        name: vulnpilot-report
        path: vuln_report.md
