name: 🛡️ VulnPilot Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  vulnpilot-scan:
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: "${{ secrets.GOOGLE_API_KEY }}"
      GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: 🔍 Pre-Scan Validation
      run: |
        if [ -z "$GOOGLE_API_KEY" ] && [ -z "$GROQ_API_KEY" ]; then
          echo "::error::Both GOOGLE_API_KEY and GROQ_API_KEY are missing from secrets. Please add at least one to enable the AI engine."
          exit 1
        fi

    - name: 🚀 Run VulnPilot Headless Scan
      run: |
        # Scan the current repository (./) and fail if HIGH severity found
        python backend/cli.py --target "./" --fail-on "High" --output "vuln_report.md"

    - name: 📄 Post Security Report as PR Comment
      if: github.event_name == 'pull_request'
      uses: thollander/actions-comment-pull-request@v2
      with:
        filePath: vuln_report.md
        comment_tag: security_report

    - name: 📊 Summary Reporting
      run: |
        echo "## 🛡️ VulnPilot Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        cat vuln_report.md >> $GITHUB_STEP_SUMMARY

    - name: 📤 Upload Scan Results
      uses: actions/upload-artifact@v3
      with:
        name: vulnpilot-report
        path: vuln_report.md
